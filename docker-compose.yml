version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=your_key_here
    volumes:
      - ./chroma:/chroma
      - ./data:/data

  ingest:
    build: ./ingest
    environment:
      - OPENAI_API_KEY=your_key_here
    volumes:
      - ./chroma:/chroma
      - ./data:/data